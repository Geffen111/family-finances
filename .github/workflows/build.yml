name: Build Family Finance (Windows)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # Don't turn compiler warnings into hard errors (the action's default)
          rustflags: ""

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        shell: powershell
        run: npm install -g pnpm

      - name: Install frontend deps
        shell: powershell
        run: |
          # pnpm here refuses to run dependency build scripts and exits 1,
          # but node_modules is fully populated before that error. Tolerate
          # the exit, then build esbuild explicitly (rebuild bypasses the
          # build-approval gate). Ending on a success keeps the step green.
          pnpm install
          Write-Host "pnpm install finished with exit code $LASTEXITCODE"
          pnpm rebuild esbuild
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Tauri app
        shell: powershell
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm tauri build

      - name: Publish to "latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Family Finance (latest build)
          body: |
            Latest Windows build of Family Finance.
            Download the `.msi` below, run it, and you're done.
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
